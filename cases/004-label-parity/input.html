<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Account settings</title>
</head>
<body>
  <header>
    <h1>Account settings</h1>
  </header>

  <nav class="tabs" aria-label="Settings sections">
    <a href="#payments" class="tab is-active">Billing</a>
    <a href="#security" class="tab">Security</a>
    <a href="#members" class="tab">Team</a>
  </nav>

  <main>
    <section id="payments">
      <h2>Payments</h2>
      <p>Manage your payment methods, invoices, and billing address.</p>
      <button>Add payment method</button>
    </section>

    <section id="security">
      <h2>Security</h2>
      <p>Two-factor authentication, active sessions, and password.</p>
      <button>Enable 2FA</button>
    </section>

    <section id="members">
      <h2>Members</h2>
      <p>Invite people to your workspace and manage their roles.</p>
      <button>Invite member</button>
    </section>
  </main>
</body>
</html>
